<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My heart to you</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}

.title{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    font-family:Arial, sans-serif;
    font-size:40px;
    font-weight:bold;
    font-style:italic;
    z-index:10;
}

.btn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff00cc;
    color:white;
    box-shadow:0 0 20px #ff00cc;
    transition:0.3s;
}

.btn:hover{
    transform:translateX(-50%) scale(1.1);
}
</style>
</head>

<body>

<div class="title">Love uuuu</div>

<canvas id="canvas"></canvas>

<button class="btn" onclick="magic()">click this to see magic happen</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let zigzagSpeed = 0.7;

function magic(){
    const btn = document.querySelector(".btn");

    if(zigzagSpeed === 0.7){
        zigzagSpeed = 1.5;
        btn.innerText = "slow motion 💗";
    } else {
        zigzagSpeed = 0.7;
        btn.innerText = "speed up ✨";
    }
}

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => {
    resize();
    generateHeart();
    createParticles();
});

const particles = [];
const heartPoints = [];

/* ⭐ FIXED SPAWN POINT (DOT) */
const spawnPoint = {
    x: 0,
    y: 0
};

function heartShape(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y: -(13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t))
    };
}

function generateHeart(){
    heartPoints.length = 0;

    const scale = Math.min(canvas.width, canvas.height) * 0.015;

    for(let t=0; t<Math.PI*2; t+=0.008){
        const p = heartShape(t);

        heartPoints.push({
            x: canvas.width/2 + p.x * scale,
            y: canvas.height/2 + p.y * scale
        });
    }

    /* place spawn dot at bottom center */
    spawnPoint.x = canvas.width / 2;
    spawnPoint.y = canvas.height - 30;
}

/* spawn from the dot */
function spawnFromDot(){
    return {
        x: spawnPoint.x,
        y: spawnPoint.y
    };
}

class Particle{
    constructor(target){

        const spawn = spawnFromDot();

        this.x = spawn.x;
        this.y = spawn.y;

        this.tx = target.x;
        this.ty = target.y;

        this.size = Math.random() * 2 + 0.5;

        this.vx = (Math.random()-12) * 2;
        this.vy = -Math.random() * 2;

        this.life = Math.random() * 100;
    }

    update(){
        this.life += 0.03;

        this.vx += (Math.random()-0.5) * zigzagSpeed;
        this.vy += (Math.random()-0.5) * zigzagSpeed;

        this.vx += (this.tx - this.x) * 0.0012;
        this.vy += (this.ty - this.y) * 0.0012;

        this.vx *= 0.96;
        this.vy *= 0.96;

        this.x += this.vx;
        this.y += this.vy;
    }

    draw(){
        const glow = 10 + Math.sin(this.life) * 8;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);

        ctx.fillStyle = "#ffffff";
        ctx.shadowBlur = glow;
        ctx.shadowColor = "#aaaaaa";

        ctx.fill();
    }
}

function createParticles(){
    particles.length = 0;

    for(let i=0; i<heartPoints.length; i++){
        particles.push(new Particle(heartPoints[i]));
    }
}

generateHeart();
createParticles();

/* draw spawn dot */
function drawSpawnDot(){
    ctx.beginPath();
    ctx.arc(spawnPoint.x, spawnPoint.y, 6, 0, Math.PI*2);
    ctx.fillStyle = "#ff00cc";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff00cc";
    ctx.fill();
}

/* background lines */
const lines = [];

for(let i=0;i<40;i++){
    lines.push({
        x1: Math.random()*canvas.width,
        y1: Math.random()*canvas.height,
        x2: Math.random()*canvas.width,
        y2: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3
    });
}

function drawLines(){
    ctx.strokeStyle = "rgba(100,100,255,0.08)";
    ctx.lineWidth = 1;

    lines.forEach(line=>{
        line.x1 += line.vx;
        line.y1 += line.vy;
        line.x2 -= line.vx;
        line.y2 -= line.vy;

        ctx.beginPath();
        ctx.moveTo(line.x1, line.y1);
        ctx.lineTo(line.x2, line.y2);
        ctx.stroke();
    });
}

function animate(){
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawLines();
    drawSpawnDot(); // ⭐ DOT ALWAYS VISIBLE

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
